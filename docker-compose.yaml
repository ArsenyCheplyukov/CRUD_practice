services:
  db:
    container_name: database
    image: postgres:18.3
    restart: always
    env_file:
      - ./db/.env
    volumes:
      - ./db/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  app:
    build: ./project
    container_name: app
    restart: always
    env_file:
      - ./project/.env
    volumes:
      - ./project:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
